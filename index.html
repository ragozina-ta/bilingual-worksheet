<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Рабочий лист: Многоклеточный организм</title>
    <style>
        /* Базовые мобильные стили */
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #e6f2ff 0%, #f0f7ff 100%);
            color: #333;
            margin: 0;
            padding: 10px;
            line-height: 1.5;
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }
        
        .worksheet-container {
            max-width: 100%;
            margin: 0 auto;
            background: white;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0, 102, 204, 0.15);
            border-radius: 10px;
            border: 2px solid #4a8cff;
            position: relative;
            overflow: hidden;
        }
        
        .worksheet-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #ff6600, #0066cc, #66cc99, #9966ff);
            z-index: 1;
        }
        
        /* Адаптивные медиа-запросы */
        @media screen and (max-width: 768px) {
            body {
                padding: 8px;
                font-size: 15px;
            }
            
            .worksheet-container {
                padding: 12px;
                border-radius: 8px;
            }
            
            .reference-title {
                font-size: 20px !important;
                padding: 10px !important;
                margin-bottom: 15px !important;
            }
            
            .section-title {
                font-size: 18px !important;
                margin: 15px 0 8px 0 !important;
            }
            
            .header h1 {
                font-size: 22px !important;
            }
            
            .header h2 {
                font-size: 18px !important;
            }
            
            .student-info {
                flex-direction: column;
                gap: 10px;
                padding: 10px !important;
            }
            
            .student-info div {
                width: 100%;
                margin-bottom: 5px;
            }
            
            .student-info span {
                min-width: 100%;
                margin-top: 5px;
                padding: 5px 0;
            }
            
            /* Адаптивные таблицы */
            .term-table, .tissue-table {
                font-size: 14px !important;
            }
            
            .term-table th, .term-table td,
            .tissue-table th, .tissue-table td {
                padding: 6px !important;
                font-size: 13px;
            }
            
            /* Словарь терминов */
            .dictionary-grid {
                grid-template-columns: 1fr !important;
                gap: 10px !important;
            }
            
            .dictionary-column {
                padding: 10px !important;
            }
            
            .dictionary-title {
                font-size: 18px !important;
                margin-bottom: 15px !important;
            }
            
            /* Задание с двумя колонками */
            .two-columns {
                grid-template-columns: 1fr !important;
                gap: 20px !important;
            }
            
            .tissue-image {
                height: 100px !important;
            }
            
            .image-label, .name-label {
                width: 35px !important;
                height: 35px !important;
                font-size: 16px !important;
            }
            
            /* Кружки для тканей сердца */
            .heart-zones {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            
            .zone {
                width: 120px !important;
                height: 120px !important;
                margin: 5px !important;
            }
            
            /* Области для рисования */
            .drawing-area-large {
                height: 150px !important;
            }
            
            .motto-area {
                height: 100px !important;
                padding: 10px !important;
                font-size: 14px !important;
            }
            
            /* Кнопка проверки */
            .check-button {
                padding: 12px 20px !important;
                font-size: 16px !important;
                width: 100%;
            }
            
            /* Домашнее задание */
            .homework-option {
                padding: 12px !important;
            }
            
            /* Пирамида */
            .pyramid {
                width: 95% !important;
            }
            
            .pyramid-level {
                padding: 8px !important;
                font-size: 14px;
            }
            
            .pyramid-level input {
                width: 70% !important;
                max-width: 200px;
            }
            
            /* Вводные поля */
            input[type="text"] {
                font-size: 16px !important; /* Увеличиваем для удобства на мобильных */
                padding: 8px 0 !important;
            }
            
            .match-input, .answer-input, .heart-input {
                font-size: 15px !important;
            }
            
            /* Печатные инструкции */
            .print-instructions {
                padding: 10px !important;
                font-size: 12px !important;
                margin: 10px 0 !important;
            }
        }
        
        @media screen and (max-width: 480px) {
            body {
                padding: 5px;
                font-size: 14px;
            }
            
            .worksheet-container {
                padding: 10px;
            }
            
            .reference-title {
                font-size: 18px !important;
            }
            
            .header h1 {
                font-size: 20px !important;
            }
            
            .header h2 {
                font-size: 16px !important;
            }
            
            .part-title {
                font-size: 16px !important;
                padding: 8px 10px !important;
            }
            
            .task-title {
                font-size: 15px !important;
            }
            
            .task-number {
                width: 28px !important;
                height: 28px !important;
                font-size: 14px !important;
            }
            
            .tissue-image {
                height: 80px !important;
            }
            
            .drawing-area-large {
                height: 120px !important;
            }
            
            .motto-area {
                height: 80px !important;
                font-size: 13px !important;
            }
            
            .check-button {
                padding: 10px 15px !important;
                font-size: 15px !important;
            }
            
            /* Улучшаем скроллинг на мобильных */
            html {
                overflow-x: hidden;
            }
            
            /* Убираем горизонтальный скролл */
            img {
                max-width: 100%;
                height: auto;
            }
            
            /* Улучшаем тач-цели */
            input, button, select, textarea {
                min-height: 44px;
            }
        }
        
        /* Поворот экрана */
        @media screen and (orientation: landscape) and (max-height: 600px) {
            .worksheet-container {
                padding: 10px;
            }
            
            .drawing-area-large {
                height: 100px !important;
            }
            
            .heart-zones {
                flex-direction: row !important;
                justify-content: center;
            }
            
            .zone {
                width: 100px !important;
                height: 100px !important;
            }
        }
        
        /* Для больших экранов */
        @media screen and (min-width: 1200px) {
            .worksheet-container {
                max-width: 21cm;
            }
        }
        
        /* Для планшетов */
        @media screen and (min-width: 769px) and (max-width: 1024px) {
            .worksheet-container {
                max-width: 95%;
                padding: 20px;
            }
            
            .dictionary-grid {
                grid-template-columns: 1fr !important;
            }
            
            .two-columns {
                gap: 20px !important;
            }
            
            .tissue-image {
                height: 100px !important;
            }
        }
        
        /* Стили для экрана */
        @media screen {
            /* Остальные стили остаются без изменений */
            .reference-paragraph {
                background: linear-gradient(135deg, #f9fbff, #ffffff);
                padding: 15px;
                border-radius: 10px;
                border-left: 5px solid #0066cc;
                margin-bottom: 20px;
                box-shadow: 0 4px 8px rgba(0,0,0,0.05);
                font-family: 'Segoe UI', 'Arial', sans-serif;
            }
            
            /* ... остальные стили ... */
            
        }
        
        /* Стили для печати */
        @media print {
            /* ... существующие стили печати ... */
            
            /* Добавляем поддержку мобильной печати */
            @page {
                margin: 1cm;
            }
            
            body {
                font-size: 11pt !important;
                line-height: 1.3;
            }
            
            .worksheet-container {
                padding: 0.5cm !important;
                box-shadow: none !important;
                border: 1px solid #000 !important;
            }
            
            /* Скрываем непечатаемые элементы */
            .check-button-container,
            .print-instructions {
                display: none !important;
            }
            
            /* Улучшаем читаемость при печати */
            .highlight-term {
                background: #f0f0f0 !important;
                border: 1px solid #ccc !important;
            }
        }
        
        /* Общие улучшения для мобильных */
        .text-block {
            margin-bottom: 12px;
            padding: 8px;
        }
        
        /* Улучшаем доступность для тач-устройств */
        button, input, select, textarea {
            touch-action: manipulation;
        }
        
        /* Предотвращаем масштабирование при фокусе на iOS */
        input, textarea {
            font-size: 16px;
        }
        
        @supports (-webkit-touch-callout: none) {
            input, textarea {
                font-size: 16px;
            }
        }
        
        /* Улучшаем видимость активных элементов */
        input:focus, button:focus, select:focus, textarea:focus {
            outline: 2px solid #0066cc;
            outline-offset: 2px;
        }
        
        /* Добавляем плавные переходы */
        .worksheet-container, .task, .zone, .check-button {
            transition: all 0.3s ease;
        }
        
        /* Оптимизация для медленных сетей */
        img {
            background-color: #f5f5f5;
        }
        
        /* ... остальные существующие стили ... */
        
        /* Добавляем скрытие элементов на мобильных при необходимости */
        .mobile-hidden {
            display: none;
        }
        
        @media screen and (min-width: 769px) {
            .mobile-hidden {
                display: block;
            }
        }
    </style>
</head>
<body>
    <!-- Контент остается без изменений -->
    <div class="print-instructions screen-only">
        <strong>🎯 Инструкция по печати:</strong> Нажмите Ctrl+P. Выберите формат A4, портретную ориентацию. 
        Для лучшего результата в настройках печати выберите "Фоновая графика" или "Фоновые изображения".
    </div>
    
    <div class="worksheet-container">
        <!-- ... весь контент методички ... -->
    </div>
    
    <div class="print-instructions screen-only" style="margin-top: 15px; font-size: 12px;">
        <strong>✨ Готово к печати!</strong> Все изображения загружены. Нажмите Ctrl+P для печати на листах A4.
    </div>
    
    <script>
        // Добавляем обработчик для улучшения работы на мобильных
        document.addEventListener('DOMContentLoaded', function() {
            // Предотвращаем зум при двойном тапе на iOS
            let lastTouchEnd = 0;
            document.addEventListener('touchend', function(event) {
                const now = (new Date()).getTime();
                if (now - lastTouchEnd <= 300) {
                    event.preventDefault();
                }
                lastTouchEnd = now;
            }, false);
            
            // Улучшаем фокус на мобильных
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    // Небольшая задержка для корректного отображения клавиатуры
                    setTimeout(() => {
                        this.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 300);
                });
            });
            
            // Добавляем вибрацию при нажатии кнопки (опционально)
            const checkButton = document.querySelector('.check-button');
            if ('vibrate' in navigator) {
                checkButton.addEventListener('click', function() {
                    navigator.vibrate(50);
                });
            }
        });
        
        // ... остальной JavaScript код ...
    </script>
</body>
</html>
